<!DOCTYPE html>

    <link rel="stylesheet" href="styles/small.css">

<body>
    <header>
        <div class="logo-group">
            <img src="images/logo-chamber.svg" alt="Feira de Santana Chamber of Commerce logo" width="140" height="60">

    <nav id="primary-nav">
        <ul>
            <li><a href="index.html">Home</a></li>

    <main>

        <div class="directory-controls">
            <p id="member-count" class="member-count"></p>
            <div class="view-toggle" role="group" aria-label="Directory display options">

        <div class="dev-info">
            <p>Vitor Souza &bull; WDD 231</p>
