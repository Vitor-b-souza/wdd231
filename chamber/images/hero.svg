<svg viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Illustration of the Feira de Santana marketplace at sunset</title>

  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ddc3"/>
      <stop offset="55%" stop-color="#d9a15a"/>
      <stop offset="100%" stop-color="#b5502e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="600" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="1250" cy="230" r="90" fill="#f2ead9" opacity="0.9"/>

  <!-- Distant hills -->
  <path d="M0 380 Q 200 320 400 370 T 800 360 T 1200 380 T 1600 360 V600 H0 Z" fill="#6b7a4f" opacity="0.55"/>

  <!-- Ground -->
  <rect y="430" width="1600" height="170" fill="#4f5c39"/>

  <!-- Simple market stalls silhouette -->
  <g fill="#2b2118">
    <rect x="120" y="330" width="140" height="100" />
    <polygon points="100,330 280,330 190,270" />
    <rect x="330" y="350" width="120" height="80" />
    <polygon points="315,350 465,350 390,300" />
    <rect x="1050" y="340" width="130" height="90" />
    <polygon points="1035,340 1195,340 1115,285" />
    <rect x="1250" y="355" width="110" height="75" />
    <polygon points="1238,355 1372,355 1305,305" />
  </g>

  <!-- Stall awnings stripes -->
  <g fill="#b5502e">
    <rect x="100" y="325" width="180" height="12"/>
    <rect x="315" y="345" width="150" height="10"/>
    <rect x="1035" y="335" width="160" height="12"/>
    <rect x="1238" y="350" width="134" height="10"/>
  </g>

  <!-- Foreground tree/palm silhouettes -->
  <g fill="#2b2118">
    <rect x="720" y="360" width="12" height="80"/>
    <path d="M726 360 C690 340 670 320 660 300 C700 305 720 325 726 360 Z"/>
    <path d="M726 360 C762 340 782 320 792 300 C752 305 732 325 726 360 Z"/>
    <path d="M726 360 C700 350 680 335 670 320 C700 320 715 335 726 360 Z"/>
  </g>
</svg>
